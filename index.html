<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Care Services Kenya</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="header">
        <div id="title">
            <h1>Care and Support Services in Kenya</h1>
            <h2>Reported services by sub-county</h2>
        </div>

        <div id="header-controls">
            <label for="subcounty-search">Find sub-county</label>
            <div class="search-row">
                <input type="text" id="subcounty-search" list="subcounty-list" placeholder="Search sub-county">
                <datalist id="subcounty-list"></datalist>
                <button id="search-btn" type="button">Go</button>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div id="info" class="hidden">
        <div id="info-header">
            <span>Service details</span>
            <button id="close-info" type="button">✕</button>
        </div>
        <div id="info-content">
            Click a sub-county to view services.
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
